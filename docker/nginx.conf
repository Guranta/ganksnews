server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 50m;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_set_header Connection "";
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
    }

    location = /novnc-auth-by-query {
        internal;

        proxy_pass http://api:8000/api/v1/login-sessions/novnc-auth?token=$arg_token;
        proxy_set_header Host $host;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
    }

    location = /novnc-auth-by-cookie {
        internal;

        proxy_pass http://api:8000/api/v1/login-sessions/novnc-auth?token=$cookie_novnc_token;
        proxy_set_header Host $host;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
    }

    location = /novnc/vnc.html {
        auth_request /novnc-auth-by-query?token=$arg_token;
        auth_request_set $auth_status $upstream_status;

        add_header Set-Cookie "novnc_token=$arg_token; Path=/novnc/; Max-Age=3600; HttpOnly; SameSite=Strict";

        proxy_pass http://remote-browser:80/static/novnc/vnc.html;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_buffering off;
    }

    location = /novnc/websockify {
        auth_request /novnc-auth-by-cookie;
        auth_request_set $auth_status $upstream_status;

        proxy_pass http://remote-browser:80/websockify;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    location /novnc/ {
        auth_request /novnc-auth-by-cookie;
        auth_request_set $auth_status $upstream_status;

        proxy_pass http://remote-browser:80/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }
}
